name: Cazar emisoras nuevas

on:
  schedule:
    - cron: '0 9 * * 1'   # Lunes 9:00 UTC (6am ARG)
  workflow_dispatch:        # Disparo manual desde GitHub

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Descargar sugerencias.json del servidor
        env:
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -u "carlos@mammoli.ar,$FTP_PASS" mammoli.ar << 'LFTP' || true
          set ssl:verify-certificate no
          get /radio/data/sugerencias.json -o /tmp/sugerencias.json
          bye
          LFTP
          [ -f /tmp/sugerencias.json ] && echo "Sugerencias descargadas." || echo '[]' > /tmp/sugerencias.json

      - name: Cazar y verificar emisoras
        id: hunt
        run: |
          python3 hunt_stations.py --sugerencias /tmp/sugerencias.json 2>&1 | tee /tmp/hunt_log.txt
          FOUND=$(grep  '^HUNT_FOUND='   /tmp/hunt_log.txt | tail -1 | cut -d= -f2)
          FAILED=$(grep '^HUNT_FAILED='  /tmp/hunt_log.txt | tail -1 | cut -d= -f2)
          CHECKED=$(grep '^HUNT_CHECKED=' /tmp/hunt_log.txt | tail -1 | cut -d= -f2)
          echo "found=${FOUND:-0}"   >> $GITHUB_OUTPUT
          echo "failed=${FAILED:-0}" >> $GITHUB_OUTPUT
          echo "checked=${CHECKED:-0}" >> $GITHUB_OUTPUT
          echo "Encontradas: ${FOUND:-0} / Verificadas: ${CHECKED:-0}"

      - name: Subir sugerencias.json actualizado al servidor
        if: steps.hunt.outputs.found != '0'
        env:
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -u "carlos@mammoli.ar,$FTP_PASS" mammoli.ar << 'LFTP'
          set ssl:verify-certificate no
          put /tmp/sugerencias.json -o /radio/data/sugerencias.json
          bye
          LFTP

      - name: Buscar URLs alternativas para streams caídos
        id: recovery
        env:
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          # Descargar el status.json más reciente del servidor
          lftp -u "carlos@mammoli.ar,$FTP_PASS" mammoli.ar << 'LFTP' || true
          set ssl:verify-certificate no
          get /radio/status.json -o web/status.json
          bye
          LFTP

          # Buscar candidatos para las muertas (60 aprox, seguro dentro del timeout)
          python3 recuperar_caidas.py --output-json /tmp/candidatos.json 2>&1 | tee /tmp/recovery_log.txt || true

          RECUPERADOS=$(grep '^RECUPERADOS=' /tmp/recovery_log.txt | tail -1 | cut -d= -f2)
          echo "recuperados=${RECUPERADOS:-0}" >> $GITHUB_OUTPUT

          # Subir candidatos al servidor si hay alguno
          if [ "${RECUPERADOS:-0}" -gt "0" ]; then
            lftp -u "carlos@mammoli.ar,$FTP_PASS" mammoli.ar \
              -e "set ssl:verify-certificate no; put /tmp/candidatos.json -o /radio/data/candidatos_recuperados.json; bye"
          fi

      - name: Sincronizar fork del gist y postear novedades
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_PAT }}
        run: |
          python3 gist_sync.py --since "7 days ago" || true

      - name: Notificar por Telegram
        env:
          TG_TOKEN:        ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:      ${{ secrets.TG_CHAT_ID }}
          RADIO_ADMIN_KEY: ${{ secrets.RADIO_ADMIN_KEY }}
        run: |
          FOUND=${{ steps.hunt.outputs.found }}
          FAILED=${{ steps.hunt.outputs.failed }}
          CHECKED=${{ steps.hunt.outputs.checked }}
          RECUPERADOS=${{ steps.recovery.outputs.recuperados }}
          TOTAL=$(python3 -c "import re; print(len(re.findall(r'^\[', open('emisoras.txt').read(), re.M)))")
          DATE=$(date +'%Y-%m-%d')

          # Construir mensaje en archivo (evita lineas sin indentacion en YAML)
          > /tmp/tg_msg.txt
          echo "Radio Hunter -- ${DATE}" >> /tmp/tg_msg.txt
          echo "" >> /tmp/tg_msg.txt
          if [ "${FOUND:-0}" -gt "0" ]; then
            echo "Nuevas emisoras verificadas: ${FOUND}" >> /tmp/tg_msg.txt
            echo "Candidatos chequeados: ${CHECKED}" >> /tmp/tg_msg.txt
            echo "Caidas descartadas: ${FAILED}" >> /tmp/tg_msg.txt
            echo "Total en directorio: ${TOTAL}" >> /tmp/tg_msg.txt
            echo "" >> /tmp/tg_msg.txt
            grep -A 30 'Por provincia:' /tmp/hunt_log.txt \
              | grep -E '^\s+[0-9]+' | head -8 >> /tmp/tg_msg.txt || true
            echo "" >> /tmp/tg_msg.txt
            echo "Revisar y aprobar:" >> /tmp/tg_msg.txt
            echo "https://mammoli.ar/radio/admin_sugerencias.php?key=${RADIO_ADMIN_KEY}" >> /tmp/tg_msg.txt
          else
            echo "Sin novedades esta semana." >> /tmp/tg_msg.txt
            echo "Candidatos chequeados: ${CHECKED}" >> /tmp/tg_msg.txt
            echo "Caidas descartadas: ${FAILED}" >> /tmp/tg_msg.txt
            echo "Total en directorio: ${TOTAL}" >> /tmp/tg_msg.txt
          fi

          if [ "${RECUPERADOS:-0}" -gt "0" ]; then
            echo "" >> /tmp/tg_msg.txt
            echo "URLs alternativas encontradas para muertas: ${RECUPERADOS}" >> /tmp/tg_msg.txt
            echo "Ver candidatos: mammoli.ar/radio/data/candidatos_recuperados.json" >> /tmp/tg_msg.txt
          fi

          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "text@/tmp/tg_msg.txt" \
            -d "chat_id=${TG_CHAT_ID}" \
            > /dev/null
          echo "Telegram enviado."
