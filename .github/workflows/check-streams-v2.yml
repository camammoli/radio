name: Verificar streams v2

on:
  schedule:
    - cron: '0 */6 * * *'   # cada 6 horas
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Descargar DB del servidor
        env:
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          mkdir -p db
          lftp -u "carlos@mammoli.ar,$FTP_PASS" mammoli.ar << 'LFTP' || true
          set ssl:verify-certificate no
          get /radio/db/radio_v2.sqlite -o db/radio_v2.sqlite
          bye
          LFTP

      - name: Verificar streams y detectar cambios
        env:
          TG_TOKEN:   ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python3 crawlers/check_streams_v2.py --notify --icy --workers 40

      - name: Subir DB actualizada al servidor (upload atómico)
        env:
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -u "carlos@mammoli.ar,$FTP_PASS" mammoli.ar << 'LFTP'
          set ssl:verify-certificate no
          put db/radio_v2.sqlite -o /radio/db/radio_v2.sqlite.new
          ren /radio/db/radio_v2.sqlite.new /radio/db/radio_v2.sqlite
          bye
          LFTP
