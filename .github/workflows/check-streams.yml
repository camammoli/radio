name: Verificar streams

on:
  schedule:
    - cron: '0 */6 * * *'   # cada 6 horas: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # permite correrlo a mano desde GitHub

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Instalar dependencias
        run: sudo apt-get install -y lftp bc

      - name: Descargar historial existente del servidor
        env:
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -u "carlos@mammoli.ar,$FTP_PASS" mammoli.ar << 'LFTP' || true
          set ssl:verify-certificate no
          get /radio/status_history.json -o web/status_history.json
          bye
          LFTP

      - name: Verificar streams y subir status.json + historial
        env:
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: ./verificar_urls.sh --json --upload --quiet
