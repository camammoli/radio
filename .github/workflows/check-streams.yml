name: Verificar streams

on:
  # OBSOLETO v1 — desactivado 2026-06-27. Verificaba emisoras.json (V1) y
  # subía status.json que el player V2 ya no usa. Conservado solo como
  # workflow_dispatch por si se necesita para referencia.
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Instalar dependencias
        run: sudo apt-get install -y lftp bc

      - name: Descargar historial existente del servidor
        env:
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -u "carlos@mammoli.ar,$FTP_PASS" mammoli.ar << 'LFTP' || true
          set ssl:verify-certificate no
          get /radio/status_history.json -o web/status_history.json
          get /radio/stream_since.json   -o web/stream_since.json
          bye
          LFTP

      - name: Verificar streams y subir status.json + historial
        env:
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: ./verificar_urls.sh --json --upload --quiet

      - name: Actualizar tracking por stream y subir
        env:
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python3 track_since.py
          lftp -u "carlos@mammoli.ar,$FTP_PASS" mammoli.ar << 'LFTP'
          set ssl:verify-certificate no
          put web/stream_since.json -o /radio/stream_since.json
          bye
          LFTP
