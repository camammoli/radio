name: Enriquecer emisoras v2

on:
  schedule:
    - cron: '0 10 1,15 * *'   # días 1 y 15 de cada mes
  workflow_dispatch:

# Un solo job a la vez escribe la DB — evita corrupción por uploads simultáneos
concurrency:
  group: radio-db-write
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Descargar DB del servidor (con WAL si existe)
        env:
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          mkdir -p db
          lftp -u "carlos@mammoli.ar,$FTP_PASS" mammoli.ar << 'LFTP' || true
          set ssl:verify-certificate no
          get /radio/db/radio_v2.sqlite -o db/radio_v2.sqlite
          get /radio/db/radio_v2.sqlite-wal -o db/radio_v2.sqlite-wal || true
          get /radio/db/radio_v2.sqlite-shm -o db/radio_v2.sqlite-shm || true
          bye
          LFTP
          python3 -c "
          import sqlite3, os
          db = 'db/radio_v2.sqlite'
          if os.path.exists(db):
              c = sqlite3.connect(db)
              c.execute('PRAGMA wal_checkpoint(TRUNCATE)')
              c.close()
          "

      - name: Enriquecer con Radio Browser + ICY
        run: |
          python3 crawlers/enrich_v2.py --icy --workers 15 --force

      - name: Checkpoint WAL y subir DB al servidor (upload atómico)
        env:
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python3 -c "
          import sqlite3
          c = sqlite3.connect('db/radio_v2.sqlite')
          c.execute('PRAGMA wal_checkpoint(TRUNCATE)')
          c.execute('PRAGMA journal_mode = DELETE')
          c.close()
          "
          lftp -u "carlos@mammoli.ar,$FTP_PASS" mammoli.ar << 'LFTP'
          set ssl:verify-certificate no
          put db/radio_v2.sqlite -o /radio/db/radio_v2.sqlite.new
          mv /radio/db/radio_v2.sqlite.new /radio/db/radio_v2.sqlite
          bye
          LFTP
