name: Sincronizar gist de emisoras

on:
  schedule:
    - cron: '0 12 * * 1'   # cada lunes a las 12 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Descargar DB del servidor
        env:
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          mkdir -p db
          lftp -u "carlos@mammoli.ar,$FTP_PASS" mammoli.ar << 'LFTP' || true
          set ssl:verify-certificate no
          get /radio/db/radio_v2.sqlite -o db/radio_v2.sqlite
          bye
          LFTP

      - name: Sincronizar gist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_PAT }}
        run: |
          python3 gist_sync.py --days 7
